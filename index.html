<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <!-- Mencegah zoom manual dan menyesuaikan area poni HP (notch/safe-area) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <title>Kasir Rumah Makan - template</title> 

  <style>
    /* KUNCI MUTLAK PADA PEMBUNGKUS LUAR */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      position: fixed; /* Ini adalah kunci utamanya agar tidak terdorong address bar HP */
      top: 0; 
      left: 0; 
      right: 0; 
      bottom: 0;
      overflow: hidden; /* Biar ga ada scrollbar */
      background-color: #0d1117; /* Warna background gelap biar pas loading ga silau */
      overscroll-behavior-y: none; /* Mencegah layar HP tertarik-tarik (pull-to-refresh) */
    }

    iframe {
      border: none;
      width: 100%;  /* Menggunakan % mengikuti body, jangan gunakan vw */
      height: 100%; /* Menggunakan % mengikuti body, jangan gunakan vh */
      display: block;
    }

    /* ==========================================
       SETTING CETAK STRUK THERMAL (57mm & 80mm)
       Mengatasi cetak agar tidak perlu new tab 
       ========================================== */
    @media print {
      @page {
        margin: 0;
        /* Browser akan mengutamakan ukuran kertas kasir default (57mm/58mm/80mm) */
      }
      
      html, body {
        position: static !important;
        width: 100% !important;
        height: auto !important;
        overflow: visible !important;
        background-color: white !important;
      }

      iframe {
        position: static !important;
        width: 100% !important;
        /* Membatasi lebar aman cetak maksimal untuk kertas 80mm (72mm area cetak),
           akan otomatis mengecil menyesuaikan jika printer yang dipakai 57mm */
        max-width: 72mm !important; 
        height: 100vh !important;
      }
    }
  </style>
</head>
<body>

  <!-- Pastikan link exec Anda ada di sini -->
  <iframe src="https://script.google.com/macros/s/AKfycbzX_010K7Kpa9ziSLDjudvco4IzrsZE5HOJNyiheSaD5HjfOmMqyCae9VjGTobOeQcqqA/exec"></iframe>

</body>
</html>
